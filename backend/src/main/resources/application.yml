server:
  port: 8080

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:multimodal-rag-secret-key-change-in-production-min-256-bits}
  expiration: ${JWT_EXPIRATION:3600000}           # 1 hour (access token)
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}  # 7 days (refresh token)

spring:
  application:
    name: multimodal-rag-system
  
  cache:
    type: none

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3307/knowledge_management?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&connectionCollation=utf8mb4_unicode_ci}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        base-url: ${OPENAI_CHAT_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode}
        options:
          model: ${OPENAI_CHAT_MODEL:qwen-plus}
      embedding:
        enabled: true
        base-url: ${OPENAI_EMBEDDING_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode}
        options:
          model: ${OPENAI_EMBEDDING_MODEL:text-embedding-v3}
          dimensions: 1024
      image:
        enabled: true
      audio:
        speech:
          enabled: true
        transcription:
          enabled: true

    vectorstore:
      pgvector:
        dimensions: 1024
        datasource:
          url: ${SPRING_AI_VECTORSTORE_PGVECTOR_DATASOURCE_URL:jdbc:postgresql://127.0.0.1:5432/vector_db}
          username: ${SPRING_AI_VECTORSTORE_PGVECTOR_DATASOURCE_USERNAME:postgres}
          password: ${SPRING_AI_VECTORSTORE_PGVECTOR_DATASOURCE_PASSWORD:123456}
          driver-class-name: org.postgresql.Driver

  # Redis configuration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 200MB

# Multimodal Python Service Configuration
multimodal:
  python-service:
    base-url: ${MULTIMODAL_PYTHON_SERVICE_BASE_URL:http://localhost:8000}
    timeout: 900000  # 15 minutes for first-time model loading / large media processing

# Alibaba Cloud OSS Configuration
aliyun:
  oss:
    endpoint: ${ALIYUN_OSS_ENDPOINT:https://oss-cn-hangzhou.aliyuncs.com}
    access-key-id: ${ALIYUN_OSS_ACCESS_KEY_ID}
    access-key-secret: ${ALIYUN_OSS_ACCESS_KEY_SECRET}
    bucket-name: ${ALIYUN_OSS_BUCKET_NAME}

logging:
  level:
    com.multimodal.rag: DEBUG
    com.multimodal.rag.controller: DEBUG
    org.springframework.ai: DEBUG
    org.springframework.ai.vectorstore.pgvector: DEBUG
    org.springframework.security: INFO
    #    root: DEBUG
    org.springframework.web: DEBUG
