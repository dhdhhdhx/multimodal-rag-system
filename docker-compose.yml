services:
  # ── Infrastructure ──────────────────────────────────────────

  mysql-db:
    image: mysql:8.0
    container_name: multimodal-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-knowledge_management}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-changeme}
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
    ports:
      - "${MYSQL_PORT:-3308}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - backend

  vector-db:
    image: pgvector/pgvector:pg16
    container_name: multimodal-pgvector
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PGVECTOR_DB:-vector_db}
      POSTGRES_USER: ${PGVECTOR_USER:-user}
      POSTGRES_PASSWORD: ${PGVECTOR_PASSWORD:-changeme}
    ports:
      - "${PGVECTOR_PORT:-15432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d vector_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - backend

  redis:
    image: redis:7-alpine
    container_name: multimodal-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - backend

  # ── Application Services ────────────────────────────────────

  python-service:
    build:
      context: ./python-services
      dockerfile: Dockerfile
    container_name: multimodal-python
    restart: unless-stopped
    environment:
      - CUDA_VISIBLE_DEVICES=""
      - HF_ENDPOINT=https://hf-mirror.com
    volumes:
      - model_cache:/app/.model-cache
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 4G

  java-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: multimodal-java
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - SERVER_PORT=8080
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/${MYSQL_DATABASE:-knowledge_management}?useSSL=false&allowPublicKeyRetrieval=true&connectionCollation=utf8mb4_unicode_ci
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_ROOT_PASSWORD:-changeme}
      - SPRING_AI_VECTORSTORE_PGVECTOR_DATASOURCE_URL=jdbc:postgresql://vector-db:5432/${PGVECTOR_DB:-vector_db}
      - SPRING_AI_VECTORSTORE_PGVECTOR_DATASOURCE_USERNAME=${PGVECTOR_USER:-user}
      - SPRING_AI_VECTORSTORE_PGVECTOR_DATASOURCE_PASSWORD=${PGVECTOR_PASSWORD:-changeme}
      - MULTIMODAL_PYTHON_SERVICE_BASE_URL=http://python-service:8000
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_DATA_REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_CHAT_BASE_URL=${OPENAI_CHAT_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode}
      - OPENAI_CHAT_MODEL=${OPENAI_CHAT_MODEL:-qwen-plus}
      - OPENAI_EMBEDDING_BASE_URL=${OPENAI_EMBEDDING_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode}
      - OPENAI_EMBEDDING_MODEL=${OPENAI_EMBEDDING_MODEL:-text-embedding-v3}
      - JWT_SECRET=${JWT_SECRET:-multimodal-rag-secret-key-change-in-production-min-256-bits}
      - ALIYUN_OSS_ENDPOINT=${ALIYUN_OSS_ENDPOINT:-}
      - ALIYUN_OSS_ACCESS_KEY_ID=${ALIYUN_OSS_ACCESS_KEY_ID:-}
      - ALIYUN_OSS_ACCESS_KEY_SECRET=${ALIYUN_OSS_ACCESS_KEY_SECRET:-}
      - ALIYUN_OSS_BUCKET_NAME=${ALIYUN_OSS_BUCKET_NAME:-}
    volumes:
      - upload_data:/app/uploads
    depends_on:
      mysql-db:
        condition: service_healthy
      vector-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      python-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 2G

  vue-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: multimodal-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      java-backend:
        condition: service_healthy
    networks:
      - backend

volumes:
  mysql_data:
    name: multimodal_mysql_data
  pg_data:
    name: multimodal_pgvector_data
  redis_data:
    name: multimodal_redis_data
  model_cache:
    name: multimodal_model_cache
  upload_data:
    name: multimodal_upload_data

networks:
  backend:
    driver: bridge
    name: multimodal-network